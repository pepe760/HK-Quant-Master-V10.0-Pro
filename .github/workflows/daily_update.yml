name: Daily Quant Update

on:
  schedule:
    # This runs at 01:00 UTC (9:00 AM HK Time) every day
    - cron: '0 1 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Quant Script
        run: python main.py

      - name: Commit and Push index.html
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          # 檢查是否有檔案變更，避免因為沒有東西可 commit 而報錯
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily Update: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
